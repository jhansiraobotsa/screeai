# Render Blueprint for Screen.ai
# One web service (Express serves built frontend + /api) + a free Redis instance.
services:
  - type: web
    name: screenai
    runtime: node
    plan: free
    # Install ALL deps (vite/tsx are devDeps and needed to build+run), then build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Redis connection string from the Render Redis instance below.
      - key: REDIS_URL
        fromService:
          type: redis
          name: screenai-redis
          property: connectionString
      # Secrets — set these values in the Render dashboard (sync:false = not in git).
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
      - key: VITE_DEEPGRAM_API_KEY
        sync: false
      - key: VITE_ANTHROPIC_API_KEY
        sync: false
      - key: VITE_OPENAI_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: APP_URL
        sync: false

  - type: redis
    name: screenai-redis
    plan: free
    ipAllowList: []  # only accessible from within Render
    maxmemoryPolicy: noeviction